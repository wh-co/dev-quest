<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dev Quest">
<title>Dev Quest — apprends le code en jouant</title>
<style>
  :root{
    --bg:#eef1fb; --bg2:#e7ebfa;
    --card:#ffffff; --ink:#1f2740; --muted:#6b7488; --line:#e6e9f2;
    --brand:#6366f1; --brand2:#8b5cf6;
    --ok:#22c55e; --ok-bg:#e9fbef; --ko:#ef4444; --ko-bg:#fdecec;
    --xp:#f59e0b; --streak:#fb7185;
    --r:20px; --shadow:0 10px 30px rgba(40,50,90,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#eef1fb,#e9ecfb 40%,#f3f0fb);
    color:var(--ink); min-height:100vh; line-height:1.6;
    padding:0 0 90px;
  }
  /* ---------- TOP BAR ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(255,255,255,.82); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px; padding:10px 16px;
  }
  header .logo{font-weight:800; font-size:18px; letter-spacing:-.02em; display:flex; align-items:center; gap:7px;}
  header .logo .sp{background:linear-gradient(90deg,var(--brand),var(--brand2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  header .stats{margin-left:auto; display:flex; align-items:center; gap:14px; font-weight:700; font-size:14px;}
  header .stat{display:flex; align-items:center; gap:5px;}
  header .stat .n{font-variant-numeric:tabular-nums;}
  .xpmini{width:90px; height:9px; background:var(--line); border-radius:99px; overflow:hidden;}
  .xpmini > i{display:block; height:100%; background:linear-gradient(90deg,var(--xp),#fbbf24); width:0%;}
  main{max-width:760px; margin:0 auto; padding:18px 16px;}
  h1,h2,h3{line-height:1.25;}
  /* ---------- HOME HERO ---------- */
  .hero{
    background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff; border-radius:var(--r); padding:22px 20px; box-shadow:var(--shadow);
    margin-bottom:18px; position:relative; overflow:hidden;
  }
  .hero:after{content:"🚀"; position:absolute; right:-6px; bottom:-14px; font-size:90px; opacity:.18;}
  .hero h1{margin:0 0 6px; font-size:24px;}
  .hero p{margin:0; opacity:.95; font-size:14px; max-width:80%;}
  .hero .lvlrow{display:flex; align-items:center; gap:10px; margin-top:14px;}
  .hero .lvlbadge{background:rgba(255,255,255,.22); border-radius:12px; padding:6px 11px; font-weight:800; font-size:13px;}
  .hero .xpbar{flex:1; height:12px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden;}
  .hero .xpbar > i{display:block; height:100%; background:#fff; width:0%; transition:width .5s;}
  .hero .xptxt{font-size:12px; font-weight:700; opacity:.95;}
  /* ---------- SECTION TITLES ---------- */
  .sec-title{display:flex; align-items:center; gap:8px; font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:800; margin:22px 4px 12px;}
  /* ---------- BADGES STRIP ---------- */
  .badges{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px; -webkit-overflow-scrolling:touch;}
  .badge{flex:0 0 auto; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px 10px; text-align:center; min-width:74px; box-shadow:var(--shadow);}
  .badge .em{font-size:22px; filter:grayscale(1) opacity(.35);}
  .badge.on .em{filter:none;}
  .badge .nm{font-size:10px; color:var(--muted); margin-top:3px; font-weight:700; line-height:1.15;}
  /* ---------- WORLD MAP ---------- */
  .map{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:430px){.map{grid-template-columns:1fr;}}
  .world{
    background:var(--card); border-radius:var(--r); padding:16px; box-shadow:var(--shadow);
    border:1px solid var(--line); cursor:pointer; position:relative; overflow:hidden;
    transition:transform .12s ease;
  }
  .world:active{transform:scale(.97);}
  .world .em{font-size:30px;}
  .world h3{margin:8px 0 2px; font-size:16px;}
  .world .sub{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .world .pbar{height:8px; background:var(--line); border-radius:99px; overflow:hidden;}
  .world .pbar > i{display:block; height:100%; width:0%; border-radius:99px;}
  .world .pct{font-size:11px; color:var(--muted); font-weight:700; margin-top:5px;}
  .world.locked{opacity:.55; filter:saturate(.4);}
  .world .lockicon{position:absolute; top:14px; right:14px; font-size:16px; opacity:.5;}
  .world .stripe{position:absolute; left:0; top:0; bottom:0; width:6px;}
  /* ---------- LEVEL LIST ---------- */
  .back{display:inline-flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:99px; padding:8px 14px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:var(--shadow);}
  .worldhead{display:flex; align-items:center; gap:12px; margin:16px 2px 6px;}
  .worldhead .em{font-size:34px;}
  .worldhead h2{margin:0; font-size:22px;}
  .worldhead .sub{font-size:13px; color:var(--muted);}
  .levels{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  .lvl{
    display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:14px 15px; box-shadow:var(--shadow); cursor:pointer;
  }
  .lvl .node{width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; flex-shrink:0; color:#fff;}
  .lvl .t{font-weight:700; font-size:15px;}
  .lvl .d{font-size:12px; color:var(--muted);}
  .lvl .chev{margin-left:auto; color:var(--muted); font-size:20px;}
  .lvl.locked{opacity:.5;}
  .lvl.locked .node{background:#c7cbd8;}
  .lvl.done .node{background:var(--ok);}
  /* ---------- LESSON / LEVEL VIEW ---------- */
  .lesson{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:20px; box-shadow:var(--shadow); margin-top:14px;}
  .lesson h2{margin:0 0 4px; font-size:21px;}
  .lesson .kicker{font-size:12px; font-weight:800; letter-spacing:.05em; text-transform:uppercase;}
  .lesson p{font-size:15.5px;}
  .lesson h3{font-size:16px; margin:18px 0 6px;}
  .callout{border-radius:14px; padding:12px 14px; margin:14px 0; font-size:14.5px; border:1px solid;}
  .callout .lab{font-weight:800; display:block; margin-bottom:3px; font-size:12px; text-transform:uppercase; letter-spacing:.04em;}
  .c-key{background:var(--ok-bg); border-color:#bbeecb;} .c-key .lab{color:#15803d;}
  .c-ana{background:#eef4ff; border-color:#cfe0ff;} .c-ana .lab{color:#2563eb;}
  .c-warn{background:#fff7e6; border-color:#ffe4ad;} .c-warn .lab{color:#b45309;}
  .c-case{background:#f7f0ff; border-color:#e6d5ff;} .c-case .lab{color:#7c3aed;}
  pre.code{background:#1e293b; color:#e2e8f0; border-radius:12px; padding:14px; overflow-x:auto; font-size:13px; line-height:1.55; margin:12px 0;}
  pre.code .cm{color:#7c8aa5;} pre.code .kw{color:#c4b5fd;} pre.code .st{color:#86efac;} pre.code .tg{color:#fca5a5;}
  code.inl{background:#eceffb; padding:1px 6px; border-radius:6px; font-size:.92em; color:#4f46e5;}
  /* ---------- CHALLENGE ---------- */
  .defi{background:linear-gradient(135deg,#fff,#f6f4ff); border:1px solid #e6d5ff; border-radius:var(--r); padding:18px; box-shadow:var(--shadow); margin-top:16px;}
  .defi .lab{font-weight:800; color:var(--brand2); font-size:12px; text-transform:uppercase; letter-spacing:.05em;}
  .defi .q{font-weight:700; font-size:16px; margin:8px 0 14px;}
  .opts{display:flex; flex-direction:column; gap:10px;}
  .opt{background:#fff; border:2px solid var(--line); border-radius:13px; padding:13px 15px; font-size:15px; text-align:left; cursor:pointer; font-weight:600; transition:.12s;}
  .opt:active{transform:scale(.98);}
  .opt.good{background:var(--ok-bg); border-color:var(--ok); color:#15803d;}
  .opt.bad{background:var(--ko-bg); border-color:var(--ko); color:#b91c1c;}
  .expl{margin-top:12px; font-size:14px; background:#f3f5fc; border-radius:12px; padding:12px; display:none;}
  .expl.show{display:block;}
  textarea.editor{width:100%; min-height:120px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; border:1px solid var(--line); border-radius:12px; padding:12px; background:#0f172a; color:#e2e8f0; resize:vertical;}
  .runrow{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  iframe.out{width:100%; min-height:80px; border:1px solid var(--line); border-radius:12px; background:#fff; margin-top:10px;}
  .btn{border:none; border-radius:13px; padding:13px 18px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:var(--shadow);}
  .btn.primary{background:linear-gradient(90deg,var(--brand),var(--brand2)); color:#fff;}
  .btn.ghost{background:#fff; border:1px solid var(--line); color:var(--ink);}
  .btn:disabled{opacity:.5; cursor:default;}
  .btn.full{width:100%; margin-top:14px;}
  /* ---------- CELEBRATION ---------- */
  #cel{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; background:rgba(20,24,45,.45); backdrop-filter:blur(3px);}
  #cel.show{display:flex;}
  .celcard{background:#fff; border-radius:24px; padding:28px 26px; text-align:center; max-width:320px; box-shadow:0 30px 60px rgba(0,0,0,.3); animation:pop .3s ease;}
  @keyframes pop{from{transform:scale(.8); opacity:0;}to{transform:scale(1); opacity:1;}}
  .celcard .big{font-size:56px;}
  .celcard h3{margin:6px 0 4px; font-size:22px;}
  .celcard .xpwin{color:var(--xp); font-weight:800; font-size:18px; margin:8px 0;}
  .celcard p{color:var(--muted); font-size:14px; margin:6px 0 16px;}
  .confetti{position:fixed; top:-10px; width:9px; height:14px; z-index:59; pointer-events:none;}
  /* ---------- MISC ---------- */
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:20px;}
  .foot{text-align:center; color:var(--muted); font-size:12px; margin:26px 0 10px;}
  .reset{color:var(--muted); text-decoration:underline; cursor:pointer; font-size:12px;}
  /* modes Jouer / Cours */
  .modes{display:flex; gap:6px; background:#e5e9f7; padding:5px; border-radius:14px; margin-bottom:16px;}
  .modebtn{flex:1; border:none; background:transparent; padding:11px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; color:var(--muted);}
  .modebtn.active{background:#fff; color:var(--ink); box-shadow:var(--shadow);}
  /* onglets de chapitres (mode Cours) */
  .ctabs{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; -webkit-overflow-scrolling:touch;}
  .ctab{flex:0 0 auto; border:2px solid var(--line); background:#fff; border-radius:99px; padding:8px 14px; font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); white-space:nowrap;}
  .ctab.active{box-shadow:var(--shadow);}
  .chapnum{font-size:12px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;}
  .courseintro{color:var(--muted); font-size:13.5px; margin:0 4px 12px;}
</style>
</head>
<body>
<header>
  <div class="logo">🎮 <span class="sp">Dev&nbsp;Quest</span></div>
  <div class="stats">
    <div class="stat" title="Ta série de jours">🔥 <span class="n" id="hStreak">0</span></div>
    <div class="stat" title="Niveau">⭐ <span class="n" id="hLvl">1</span></div>
    <div class="xpmini"><i id="hXp"></i></div>
  </div>
</header>

<main id="app"></main>

<div id="cel">
  <div class="celcard">
    <div class="big" id="celEmo">🎉</div>
    <h3 id="celTitle">Bravo !</h3>
    <div class="xpwin" id="celXp">+10 XP</div>
    <p id="celMsg">Niveau terminé.</p>
    <button class="btn primary full" onclick="closeCel()">Continuer</button>
  </div>
</div>

<script>
/* ================================================================
   DEV QUEST — moteur de jeu (vanilla JS, 0 dépendance)
   Le CONTENU est une donnée (GAME.worlds). Pour ajouter un niveau,
   on ajoute un objet dans "levels" — le moteur s'occupe du reste.
   ================================================================ */

/* ---------- petit utilitaire pour colorer du code (léger) ---------- */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ---------- LE JEU : mondes + niveaux ---------- */
const GAME = { worlds: [

/* ============================ MONDE : LE WEB ============================ */
{ id:"web", titre:"Le Web", emoji:"🌐", couleur:"#0ea5e9", desc:"Comment marche un site",
 levels:[
  { titre:"Front, back, navigateur",
    lecon:`<span class="kicker" style="color:#0ea5e9">Les fondations</span>
    <h2>C'est quoi un site web ?</h2>
    <p>Quand tu ouvres un site, deux mondes travaillent ensemble :</p>
    <div class="callout c-ana"><span class="lab">🧠 Analogie resto</span>
    Le <b>front-end</b> = la salle du restaurant (ce que tu vois : déco, menu, boutons).
    Le <b>back-end</b> = la cuisine (ce que tu ne vois pas : on prépare, on stocke, on calcule).</div>
    <p>Le <b>navigateur</b> (Chrome, Safari) est le serveur… qui apporte les plats à ta table. Il lit 3 langages du front :</p>
    <ul>
      <li>🧱 <b>HTML</b> — la structure (les murs, les meubles)</li>
      <li>🎨 <b>CSS</b> — le style (la peinture, la déco)</li>
      <li>⚡ <b>JavaScript</b> — le mouvement (les boutons qui réagissent)</li>
    </ul>
    <div class="callout c-key"><span class="lab">🔑 À retenir</span>
    Front = ce que l'utilisateur voit. Back = le moteur caché (souvent en <b>Python</b>, comme ton app Lightman).</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Ne confonds pas <b>navigateur</b> (Chrome, Safari — le logiciel qui affiche) et <b>serveur</b> (la machine qui héberge le site, ailleurs sur internet). Le navigateur ne contient rien : il va chercher le site à chaque fois.</div>`,
    defi:{type:"quiz", q:"Dans l'analogie du restaurant, le back-end c'est…",
      opts:["La salle et la déco","La cuisine cachée","Le menu affiché"], correct:1,
      expl:"Le back-end = la cuisine : invisible, mais c'est là qu'on prépare et qu'on stocke. Le front, c'est la salle."} },

  { titre:"Client & serveur",
    lecon:`<span class="kicker" style="color:#0ea5e9">Les fondations</span>
    <h2>Client ↔ Serveur</h2>
    <p>Ton téléphone est le <b>client</b> : il <b>demande</b>. Une machine allumée quelque part est le <b>serveur</b> : elle <b>répond</b>.</p>
    <pre class="code"><span class="cm">// 1. Le client demande</span>
Client  ──►  "Donne-moi la page d'accueil"
<span class="cm">// 2. Le serveur répond</span>
Serveur ──►  &lt;html&gt;...&lt;/html&gt;</pre>
    <div class="callout c-ana"><span class="lab">🧠 Analogie</span>
    Tu (client) commandes une pizza par téléphone. La pizzeria (serveur) prépare et livre. Tu n'as pas besoin de savoir COMMENT ils la font.</div>
    <p>Une <b>API</b>, c'est le menu de commande du serveur : une liste d'adresses (des <i>routes</i>) que le client peut appeler pour obtenir des données.</p>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    « Client » ne veut pas dire « une personne » : c'est le <b>programme</b> qui demande (ton navigateur, ou une appli mobile). Une appli peut très bien être un client qui appelle une API toute seule, sans humain qui clique.</div>`,
    defi:{type:"quiz", q:"Qui DEMANDE dans le duo client/serveur ?",
      opts:["Le serveur","Le client","Les deux en même temps"], correct:1,
      expl:"Le client demande, le serveur répond. Ton tél = client ; la machine qui héberge le site = serveur."} },

  { titre:"Mise en situation : suis la requête",
    lecon:`<span class="kicker" style="color:#0ea5e9">Mise en pratique</span>
    <h2>Suis le trajet, en vrai 🎯</h2>
    <p>Tu tapes l'adresse d'un site dans ton navigateur, sur ton téléphone. Voici ce qui se passe, dans l'ordre :</p>
    <pre class="code"><span class="cm">1.</span> Ton téléphone (le <b>client</b>) envoie une demande
<span class="cm">2.</span> Elle voyage jusqu'au <b>serveur</b> qui héberge le site
<span class="cm">3.</span> Le serveur répond en renvoyant les fichiers (HTML, CSS, JS)
<span class="cm">4.</span> Ton navigateur (Chrome, Safari…) assemble tout et affiche la page</pre>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Un site n'est <b>jamais</b> stocké « dans » ton téléphone par magie avant que tu l'ouvres. À chaque visite, ton téléphone repart le demander au serveur — sans connexion internet, la demande ne peut pas partir.</div>`,
    defi:{type:"quiz", q:"Tu ouvres un site que tu n'as jamais visité, en mode avion (pas de connexion). Que se passe-t-il ?",
      opts:["La page s'affiche quand même","Rien ne s'affiche : le client ne peut pas joindre le serveur","Le serveur vient chercher le téléphone"], correct:1,
      expl:"Sans connexion, le client (ton téléphone) ne peut pas envoyer sa demande au serveur. Rien à afficher : la preuve que la page n'était pas déjà là, il fallait aller la chercher."} },

  { titre:"C'est quoi une URL",
    lecon:`<span class="kicker" style="color:#0ea5e9">Adresses du web</span>
    <h2>L'adresse d'une page : l'URL</h2>
    <p>Une <b>URL</b> (« adresse » d'une ressource sur le web) est ce que tu tapes ou cliques pour aller quelque part : une page, une image, un fichier.</p>
    <pre class="code">https://o-clock.io/formation
<span class="cm">↑ protocole   ↑ domaine     ↑ chemin</span></pre>
    <ul>
      <li>🔒 <b>Protocole</b> (<code class="inl">https://</code>) — la règle de communication utilisée entre client et serveur</li>
      <li>🏠 <b>Domaine</b> (<code class="inl">o-clock.io</code>) — l'adresse du serveur, unique sur tout internet</li>
      <li>📄 <b>Chemin</b> (<code class="inl">/formation</code>) — la page précise demandée sur ce serveur</li>
    </ul>
    <div class="callout c-ana"><span class="lab">🧠 Analogie</span>
    Comme une adresse postale : le domaine = la ville, le chemin = la rue et le numéro. Change le chemin, tu restes dans la même ville (le même site) mais tu frappes à une autre porte.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Le chemin (après le premier <code class="inl">/</code>) ne change PAS de site : il pointe juste vers une autre page du même domaine. <code class="inl">o-clock.io/formation</code> et <code class="inl">o-clock.io/contact</code> sont le même site.</div>`,
    defi:{type:"quiz", q:"Dans https://o-clock.io/formation, quelle partie est le domaine ?",
      opts:["https","o-clock.io","/formation"], correct:1,
      expl:"o-clock.io = le domaine, l'adresse unique du serveur. https:// = le protocole. /formation = le chemin vers une page précise de ce site."} },

  { titre:"La requête HTTP (GET)",
    lecon:`<span class="kicker" style="color:#0ea5e9">Parler au serveur</span>
    <h2>Comment le client demande : HTTP</h2>
    <p><b>HTTP</b> est le langage commun que client et serveur utilisent pour se parler. Chaque demande du client s'appelle une <b>requête</b>.</p>
    <p>La requête la plus courante s'appelle <b>GET</b> : elle veut dire « donne-moi cette ressource », sans rien modifier sur le serveur.</p>
    <pre class="code"><span class="cm">// Ton navigateur envoie :</span>
GET /formation HTTP/1.1
<span class="cm">// Le serveur répond :</span>
200 OK
&lt;html&gt;...&lt;/html&gt;</pre>
    <div class="callout c-key"><span class="lab">🔑 À retenir</span>
    Chaque fois que tu cliques sur un lien ou tapes une URL, ton navigateur envoie une requête <b>GET</b> pour récupérer la page. (D'autres types de requêtes existent, comme <b>POST</b> pour envoyer des données — tu les verras plus tard.)</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Une requête GET ne doit jamais modifier quoi que ce soit côté serveur (pas de suppression, pas d'écriture) — elle sert uniquement à lire/récupérer. C'est une convention que respecte tout développeur.</div>`,
    defi:{type:"quiz", q:"Tu cliques sur un lien pour lire un article. Quel type de requête ton navigateur envoie-t-il ?",
      opts:["GET — il demande la page","POST — il envoie des données","Aucune, le lien s'affiche seul"], correct:0,
      expl:"Lire une page = une requête GET : le client demande, sans rien modifier côté serveur. C'est la requête la plus fréquente sur le web."} }
 ]},

/* ============================ MONDE : HTML ============================ */
{ id:"html", titre:"HTML", emoji:"🧱", couleur:"#f97316", desc:"La structure",
 levels:[
  { titre:"Les balises",
    lecon:`<span class="kicker" style="color:#f97316">HTML</span>
    <h2>Une balise = une brique</h2>
    <p>Le HTML est fait de <b>balises</b>. Une balise s'ouvre et se ferme, et enveloppe du contenu :</p>
    <pre class="code"><span class="tg">&lt;h1&gt;</span>Bonjour Wassim<span class="tg">&lt;/h1&gt;</span>
<span class="cm">&nbsp;↑ ouvre         ↑ ferme (avec /)</span></pre>
    <p>Quelques briques de base :</p>
    <pre class="code"><span class="tg">&lt;h1&gt;</span>Grand titre<span class="tg">&lt;/h1&gt;</span>
<span class="tg">&lt;p&gt;</span>Un paragraphe de texte.<span class="tg">&lt;/p&gt;</span>
<span class="tg">&lt;a</span> href=<span class="st">"https://o-clock.io"</span><span class="tg">&gt;</span>un lien<span class="tg">&lt;/a&gt;</span>
<span class="tg">&lt;img</span> src=<span class="st">"chat.jpg"</span><span class="tg">&gt;</span></pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span>
    <code class="inl">href</code> et <code class="inl">src</code> sont des <b>attributs</b> : des réglages qu'on met DANS la balise ouvrante.</div>`,
    defi:{type:"quiz", q:"Comment on ferme correctement un titre ?",
      opts:["&lt;h1&gt;","&lt;/h1&gt;","&lt;h1/&gt;"], correct:1,
      expl:"On ferme avec un slash : &lt;/h1&gt;. La balise ouvrante n'a pas de slash, la fermante oui."} },

  { titre:"Écris ta 1ère page",
    lecon:`<span class="kicker" style="color:#f97316">HTML — pratique</span>
    <h2>À toi de jouer 🎯</h2>
    <p>Écris du HTML dans la zone noire, clique <b>Tester</b>, et regarde le résultat s'afficher en dessous. Essaie d'ajouter un titre <code class="inl">&lt;h1&gt;</code> et un paragraphe <code class="inl">&lt;p&gt;</code>.</p>
    <div class="callout c-ana"><span class="lab">🧠 Comme Shopify</span>
    Tu te souviens quand tu modifiais un thème ? C'était déjà ça, du HTML. Là tu l'écris toi-même, de zéro.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Une balise ouverte sans sa fermante (<code class="inl">&lt;h1&gt;</code> sans <code class="inl">&lt;/h1&gt;</code>) peut décaler ou casser l'affichage de tout ce qui suit. Vérifie toujours que chaque balise a bien son couple ouvrant/fermant.</div>`,
    defi:{type:"code", q:"Objectif : ta page doit contenir un titre &lt;h1&gt; ET un paragraphe &lt;p&gt;.",
      start:"<h1>Salut, moi c'est Wassim</h1>\n<p>Je deviens développeur.</p>",
      check:(v)=> /<h1>[\s\S]*<\/h1>/i.test(v) && /<p>[\s\S]*<\/p>/i.test(v),
      expl:"Bien joué ! Un &lt;h1&gt; pour le titre + un &lt;p&gt; pour le texte = une vraie page HTML."} },

  { titre:"Les listes",
    lecon:`<span class="kicker" style="color:#f97316">HTML — pratique</span>
    <h2>Faire une liste</h2>
    <p>Pour une liste à puces : une balise <code class="inl">&lt;ul&gt;</code> qui contient plusieurs <code class="inl">&lt;li&gt;</code> (un par ligne de la liste).</p>
    <pre class="code"><span class="tg">&lt;ul&gt;</span>
  <span class="tg">&lt;li&gt;</span>Pain<span class="tg">&lt;/li&gt;</span>
  <span class="tg">&lt;li&gt;</span>Lait<span class="tg">&lt;/li&gt;</span>
<span class="tg">&lt;/ul&gt;</span></pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span> ul = la liste, li = un élément. Chaque &lt;li&gt; a besoin de sa balise fermante.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Un texte écrit directement dans <code class="inl">&lt;ul&gt;</code> sans <code class="inl">&lt;li&gt;</code> autour ne s'affichera pas comme un élément de liste. Chaque ligne DOIT être encapsulée dans son propre <code class="inl">&lt;li&gt;...&lt;/li&gt;</code>.</div>`,
    defi:{type:"code", q:"Ajoute au moins 3 &lt;li&gt; à l'intérieur de la liste &lt;ul&gt;.",
      start:"<h2>Ma liste de courses</h2>\n<ul>\n  <li>Pain</li>\n</ul>",
      check:(v)=> /<ul>[\s\S]*<\/ul>/i.test(v) && (v.match(/<li>/gi)||[]).length>=3,
      expl:"Une &lt;ul&gt; = liste à puces ; chaque &lt;li&gt; = un élément de la liste."} },

  { titre:"Listes numérotées & imbriquées",
    lecon:`<span class="kicker" style="color:#f97316">HTML — pratique avancée</span>
    <h2>Aller plus loin avec les listes</h2>
    <p>Deux variantes utiles : <code class="inl">&lt;ol&gt;</code> (liste <b>numérotée</b>, "ordered list") au lieu de <code class="inl">&lt;ul&gt;</code>. Et une liste peut en contenir une autre : on dit qu'elle est <b>imbriquée</b>.</p>
    <pre class="code"><span class="tg">&lt;ol&gt;</span>
  <span class="tg">&lt;li&gt;</span>Ouvrir le compte<span class="tg">&lt;/li&gt;</span>
  <span class="tg">&lt;li&gt;</span>Choisir un pseudo<span class="tg">&lt;/li&gt;</span>
<span class="tg">&lt;/ol&gt;</span>

<span class="tg">&lt;ul&gt;</span>
  <span class="tg">&lt;li&gt;</span>Fruits
    <span class="tg">&lt;ul&gt;</span>
      <span class="tg">&lt;li&gt;</span>Pomme<span class="tg">&lt;/li&gt;</span>
    <span class="tg">&lt;/ul&gt;</span>
  <span class="tg">&lt;/li&gt;</span>
<span class="tg">&lt;/ul&gt;</span></pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span>
    <code class="inl">&lt;ol&gt;</code> = numérotée (1. 2. 3.), <code class="inl">&lt;ul&gt;</code> = à puces. Une liste imbriquée se place ENTIÈREMENT à l'intérieur d'un <code class="inl">&lt;li&gt;</code> parent.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Une liste imbriquée doit rester DANS le <code class="inl">&lt;li&gt;</code> parent, avant sa balise <code class="inl">&lt;/li&gt;</code> fermante — pas après. Sinon elle sort de l'élément et casse la hiérarchie.</div>`,
    defi:{type:"code", q:"Transforme ta liste en liste NUMÉROTÉE (&lt;ol&gt;), OU ajoute une sous-liste &lt;ul&gt; imbriquée dans un de tes &lt;li&gt;.",
      start:"<h2>Étapes du matin</h2>\n<ul>\n  <li>Se lever</li>\n  <li>Petit-déjeuner</li>\n</ul>",
      check:(v)=> /<ol>[\s\S]*<\/ol>/i.test(v) || /<li>[\s\S]*?<ul>[\s\S]*?<\/ul>[\s\S]*?<\/li>/i.test(v),
      expl:"&lt;ol&gt; numérote automatiquement chaque élément. Une liste imbriquée (une &lt;ul&gt; dans un &lt;li&gt;) sert à représenter une hiérarchie, comme un sommaire."} },

  { titre:"Liens & images",
    lecon:`<span class="kicker" style="color:#f97316">HTML — pratique</span>
    <h2>Relier et illustrer</h2>
    <p>Un lien cliquable : <code class="inl">&lt;a href="..."&gt;texte&lt;/a&gt;</code>. Une image : <code class="inl">&lt;img src="..."&gt;</code>.</p>
    <pre class="code"><span class="tg">&lt;a</span> href=<span class="st">"https://o-clock.io"</span><span class="tg">&gt;</span>Voir O'Clock<span class="tg">&lt;/a&gt;</span>
<span class="tg">&lt;img</span> src=<span class="st">"https://picsum.photos/200"</span><span class="tg">&gt;</span></pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span> <code class="inl">href</code> = la destination du lien. <code class="inl">src</code> = l'adresse de l'image.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Un attribut sans guillemets (<code class="inl">href=https://o-clock.io</code>) peut casser la balise dès qu'il y a un caractère spécial dans la valeur. Toujours entourer la valeur de guillemets : <code class="inl">href="https://o-clock.io"</code>.</div>`,
    defi:{type:"code", q:"Ajoute un lien (&lt;a href&gt;) ET une image (&lt;img src&gt;).",
      start:"<h2>Mon mini-site</h2>\n<!-- ajoute ton lien et ton image ici -->\n",
      check:(v)=> /<a\s[^>]*href=/i.test(v) && /<img\s[^>]*src=/i.test(v),
      expl:"Un lien &lt;a href&gt; et une image &lt;img src&gt; : deux balises que tu retrouveras partout."} },

  { titre:"SEO de base : titre & attribut alt",
    lecon:`<span class="kicker" style="color:#f97316">HTML — SEO concret</span>
    <h2>Aider Google (et les malvoyants) à comprendre ta page</h2>
    <p>Deux petits réglages qui comptent énormément, gratuits et faciles à oublier :</p>
    <ul>
      <li>📑 Le <code class="inl">&lt;title&gt;</code> (dans le <code class="inl">&lt;head&gt;</code>) — le nom de la page, affiché dans l'onglet du navigateur ET dans les résultats Google.</li>
      <li>🖼️ L'attribut <code class="inl">alt</code> sur une <code class="inl">&lt;img&gt;</code> — un texte qui décrit l'image.</li>
    </ul>
    <pre class="code"><span class="tg">&lt;head&gt;</span>
  <span class="tg">&lt;title&gt;</span>Mon portfolio — Wassim<span class="tg">&lt;/title&gt;</span>
<span class="tg">&lt;/head&gt;</span>

<span class="tg">&lt;img</span> src=<span class="st">"chat.jpg"</span> alt=<span class="st">"Chat roux assis sur un canapé"</span><span class="tg">&gt;</span></pre>
    <div class="callout c-ana"><span class="lab">🧠 Comme sur Shopify</span>
    Le champ "texte alternatif" que tu remplissais sur une fiche produit ? C'est exactement l'attribut <code class="inl">alt</code>.</div>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span>
    <code class="inl">alt</code> n'est pas décoratif : c'est ce qui s'affiche si l'image ne charge pas, ce que lit un lecteur d'écran pour une personne malvoyante, et ce que Google utilise pour indexer l'image.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Un <code class="inl">alt</code> vide n'est correct QUE pour une image purement décorative. Ne mets jamais un <code class="inl">alt</code> qui ne décrit rien de réel (comme "image1" ou "photo") — décris ce qu'on voit vraiment.</div>`,
    defi:{type:"quiz", q:"À quoi sert l'attribut alt d'une image ?",
      opts:["À changer sa taille","À la décrire pour Google et les lecteurs d'écran","À la centrer sur la page"], correct:1,
      expl:"alt = texte alternatif : lu par les lecteurs d'écran, affiché si l'image ne charge pas, et utilisé par Google pour comprendre le contenu de l'image."} },

  { titre:"Plusieurs liens + image avec alt",
    lecon:`<span class="kicker" style="color:#f97316">HTML — pratique avancée</span>
    <h2>Un mini-site, pas juste un lien perdu</h2>
    <p>Une vraie page a souvent plusieurs liens (menu, sources, contact) et n'oublie jamais l'attribut <code class="inl">alt</code> sur ses images — tu sais maintenant pourquoi.</p>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Un <code class="inl">alt</code> oublié ne fait planter aucune page, mais c'est une mauvaise pratique systématique : Google et les lecteurs d'écran ignorent totalement l'image. Prends l'habitude de toujours le remplir.</div>`,
    defi:{type:"code", q:"Ta page doit contenir AU MOINS 2 liens (&lt;a href&gt;) ET une image avec un attribut alt REMPLI (non vide).",
      start:"<h2>Mes liens utiles</h2>\n<a href=\"https://o-clock.io\">O'Clock</a>\n<!-- ajoute un 2e lien et une image avec alt ici -->\n",
      check:(v)=> (v.match(/<a\s[^>]*href=/gi)||[]).length>=2 && /<img\s[^>]*alt=("|')[^"']+\1/i.test(v),
      expl:"Deux liens et une image avec un vrai alt (pas vide) : exactement ce qu'on retrouve sur une page pro. Un alt vide est réservé aux images purement décoratives."} },

  { titre:"Balises sémantiques : header, nav, main, footer",
    lecon:`<span class="kicker" style="color:#f97316">HTML — intégration moderne</span>
    <h2>Structurer une vraie page (pas que des &lt;div&gt;)</h2>
    <p>HTML propose des balises qui décrivent le RÔLE de chaque zone, plutôt que des <code class="inl">&lt;div&gt;</code> génériques partout :</p>
    <ul>
      <li>🎩 <code class="inl">&lt;header&gt;</code> — l'en-tête (souvent logo + titre)</li>
      <li>🧭 <code class="inl">&lt;nav&gt;</code> — le menu de navigation (les liens principaux)</li>
      <li>📦 <code class="inl">&lt;main&gt;</code> — le contenu principal de la page (un seul par page)</li>
      <li>👣 <code class="inl">&lt;footer&gt;</code> — le bas de page (copyright, infos secondaires)</li>
    </ul>
    <pre class="code"><span class="tg">&lt;header&gt;</span>
  <span class="tg">&lt;h1&gt;</span>Mon Site<span class="tg">&lt;/h1&gt;</span>
  <span class="tg">&lt;nav&gt;</span>
    <span class="tg">&lt;a</span> href=<span class="st">"#accueil"</span><span class="tg">&gt;</span>Accueil<span class="tg">&lt;/a&gt;</span>
  <span class="tg">&lt;/nav&gt;</span>
<span class="tg">&lt;/header&gt;</span>

<span class="tg">&lt;main&gt;</span>
  <span class="tg">&lt;p&gt;</span>Le contenu principal.<span class="tg">&lt;/p&gt;</span>
<span class="tg">&lt;/main&gt;</span>

<span class="tg">&lt;footer&gt;</span>
  <span class="tg">&lt;p&gt;</span>© 2026 Wassim<span class="tg">&lt;/p&gt;</span>
<span class="tg">&lt;/footer&gt;</span></pre>
    <div class="callout c-ana"><span class="lab">🧠 Comme WordPress</span>
    Ça te rappellera header.php et footer.php dans un thème WordPress — même logique, mais en HTML pur et directement dans la page.</div>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span>
    Ces balises ne changent rien visuellement par défaut, mais donnent du SENS à la structure : pour Google, les lecteurs d'écran, et les autres développeurs qui liront ton code.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    <code class="inl">&lt;main&gt;</code> ne doit apparaître qu'UNE seule fois par page — ce n'est pas une zone générique comme &lt;div&gt;. <code class="inl">&lt;nav&gt;</code> sert pour un vrai menu de navigation, pas pour n'importe quelle liste de liens.</div>`,
    defi:{type:"code", q:"Structure ta page avec &lt;header&gt;, &lt;nav&gt; (contenant au moins 1 lien), &lt;main&gt;, et &lt;footer&gt;.",
      start:"<header>\n  <h1>Mon Site</h1>\n  <!-- ajoute ta nav ici -->\n</header>\n<!-- ajoute ton main ici -->\n<!-- ajoute ton footer ici -->\n",
      check:(v)=> /<header>[\s\S]*<\/header>/i.test(v) && /<nav>[\s\S]*?<a\s[^>]*href=[\s\S]*?<\/nav>/i.test(v) && /<main>[\s\S]*<\/main>/i.test(v) && /<footer>[\s\S]*<\/footer>/i.test(v),
      expl:"header/nav/main/footer : la vraie structure d'une page moderne. C'est ce qu'on attend dès le Module 01 à O'Clock (intégration)."} },

  { titre:"Projet : ta page perso",
    lecon:`<span class="kicker" style="color:#f97316">HTML — projet</span>
    <h2>Assemble tout 🎯</h2>
    <p>Tu as vu titres, paragraphes, listes, liens, images, sémantique. Assemble-les en une vraie petite page de présentation. C'est ton premier « projet ».</p>
    <div class="callout c-ana"><span class="lab">🧠 Pour ton portfolio</span> Ce genre de page, c'est exactement ce que tu montreras à l'entrée d'O'Clock.</div>
    <div class="callout c-warn"><span class="lab">⚠️ Erreur à éviter</span>
    Vérifie CHAQUE balise ouverte : a-t-elle bien sa fermante (sauf &lt;img&gt;, qui se suffit à elle-même) ? Une seule balise oubliée peut décaler l'affichage de toute la fin de la page.</div>`,
    defi:{type:"code", q:"Fais une page avec : un titre &lt;h1&gt;, un paragraphe &lt;p&gt;, une liste &lt;ul&gt; de 3 &lt;li&gt;, et un lien &lt;a&gt;.",
      start:"<h1>Moi, Wassim</h1>\n<p>Futur développeur.</p>\n<ul>\n  <li>Gestion d'entreprise</li>\n</ul>\n",
      check:(v)=> /<h1>[\s\S]*?<\/h1>/i.test(v) && /<p>[\s\S]*?<\/p>/i.test(v) && (v.match(/<li>/gi)||[]).length>=3 && /<a\s[^>]*href=/i.test(v),
      expl:"Bravo — tu viens d'écrire une page HTML complète à la main. Ça, c'est déjà du vrai code de dev."} }
 ]},

/* ============================ MONDE : CSS ============================ */
{ id:"css", titre:"CSS", emoji:"🎨", couleur:"#3b82f6", desc:"Le style",
 levels:[
  { titre:"Colorer & styler",
    lecon:`<span class="kicker" style="color:#3b82f6">CSS</span>
    <h2>Le CSS habille le HTML</h2>
    <p>Le HTML pose les briques, le CSS les <b>peint</b>. On choisit un élément (le <i>sélecteur</i>) puis on lui donne des <i>propriétés</i> :</p>
    <pre class="code">h1 {
  color: <span class="st">crimson</span>;        <span class="cm">/* couleur du texte */</span>
  font-size: <span class="st">32px</span>;      <span class="cm">/* taille */</span>
  text-align: <span class="st">center</span>;  <span class="cm">/* centré */</span>
}</pre>
    <div class="callout c-key"><span class="lab">🔑 La recette</span>
    <code class="inl">sélecteur { propriété: valeur; }</code> — n'oublie jamais le <b>;</b> à la fin de chaque ligne.</div>
    <div class="callout c-ana"><span class="lab">🧠 Analogie</span>
    Le HTML = la maison en gris béton. Le CSS = la peinture, les rideaux, l'éclairage.</div>`,
    defi:{type:"quiz", q:"Quelle propriété change la COULEUR du texte ?",
      opts:["font-size","color","text-align"], correct:1,
      expl:"color = couleur du texte. font-size = la taille, text-align = l'alignement."} },

  { titre:"Les classes",
    lecon:`<span class="kicker" style="color:#3b82f6">CSS</span>
    <h2>Réutiliser un style : les classes</h2>
    <p>Une <b>classe</b> est une étiquette qu'on colle sur des éléments pour les styler tous pareil. En CSS, une classe commence par un <b>point</b>.</p>
    <pre class="code"><span class="cm">/* HTML */</span>
<span class="tg">&lt;p</span> class=<span class="st">"alerte"</span><span class="tg">&gt;</span>Attention !<span class="tg">&lt;/p&gt;</span>

<span class="cm">/* CSS */</span>
.alerte {
  color: <span class="st">white</span>;
  background: <span class="st">crimson</span>;
  padding: <span class="st">10px</span>;
}</pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span>
    Point (<code class="inl">.alerte</code>) en CSS = classe. Tu peux mettre la même classe sur 50 éléments : ils prendront tous le style d'un coup.</div>`,
    defi:{type:"quiz", q:"En CSS, une classe s'écrit avec…",
      opts:["un dièse #","un point .","une étoile *"], correct:1,
      expl:"Un point : .alerte. (Le dièse # sert pour un id, unique lui.)"} },

  { titre:"Taille & couleur",
    lecon:`<span class="kicker" style="color:#3b82f6">CSS — pratique</span>
    <h2>Styler pour de vrai</h2>
    <p>On met le CSS dans une balise <code class="inl">&lt;style&gt;</code>. On vise un élément, puis on lui donne des propriétés.</p>
    <pre class="code"><span class="tg">&lt;style&gt;</span>
  h1 {
    color: <span class="st">crimson</span>;
    font-size: <span class="st">40px</span>;
  }
<span class="tg">&lt;/style&gt;</span></pre>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span> Chaque propriété finit par un <b>;</b>. Ici on change la couleur ET la taille du titre.</div>`,
    defi:{type:"code", q:"Dans le &lt;style&gt;, donne à h1 une <b>color</b> ET une <b>font-size</b>.",
      start:"<h1>Regarde-moi changer !</h1>\n<style>\n  h1 {\n    /* écris ici */\n  }\n</style>",
      check:(v)=> /h1\s*\{[^}]*color\s*:/i.test(v) && /h1\s*\{[^}]*font-size\s*:/i.test(v),
      expl:"Tu viens d'habiller du HTML avec du CSS : color = couleur du texte, font-size = sa taille."} },

  { titre:"Centrer avec Flexbox",
    lecon:`<span class="kicker" style="color:#3b82f6">CSS — pratique</span>
    <h2>Le centrage moderne</h2>
    <p>Centrer un contenu, c'est le cauchemar des débutants… sauf avec <b>Flexbox</b>. Sur le conteneur : <code class="inl">display:flex</code> + <code class="inl">justify-content:center</code> (horizontal) + <code class="inl">align-items:center</code> (vertical).</p>
    <div class="callout c-key"><span class="lab">🔑 Point clé</span> Flexbox est LA compétence CSS qui revient sans arrêt à O'Clock (module 01). La voir maintenant = grosse avance.</div>`,
    defi:{type:"code", q:"Rends .box en <b>display:flex</b> et centre son contenu (<b>justify-content</b> + <b>align-items</b> à center).",
      start:'<div class="box">\n  <p>Centre-moi !</p>\n</div>\n<style>\n  .box {\n    height: 160px;\n    background: #eef;\n    /* centre le contenu ici */\n  }\n</style>',
      check:(v)=> /display\s*:\s*flex/i.test(v) && /justify-content\s*:\s*center/i.test(v) && /align-items\s*:\s*center/i.test(v),
      expl:"display:flex + justify-content:center + align-items:center = contenu parfaitement centré. Un réflexe de pro."} },

  { titre:"Projet : une carte stylée",
    lecon:`<span class="kicker" style="color:#3b82f6">CSS — projet</span>
    <h2>Le composant roi : la carte</h2>
    <p>90% des sites modernes sont faits de « cartes » : un fond, de l'espace intérieur (padding), des coins arrondis, une ombre. Fabrique la tienne.</p>`,
    defi:{type:"code", q:"Donne à .carte : un <b>background</b>, du <b>padding</b>, et des coins arrondis (<b>border-radius</b>).",

   ÉTAT DU JOUEUR (sauvegardé dans le navigateur)
   ================================================================ */
const SAVE_KEY = "devquest_save_v1";
let state = load();
/* la sauvegarde marche-t-elle dans ce lecteur ? (un aperçu la bloque souvent) */
let storageOK=false;
try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); storageOK=true; }catch(e){}

function load(){
  const base = {xp:0, done:{}, streak:0, lastDay:null, badges:{}, drafts:{}};
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw){ return Object.assign(base, JSON.parse(raw)); }
  }catch(e){}
  return base;
}
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}

/* niveau global calculé depuis l'XP : 100 XP par niveau */
function levelInfo(){
  const per=100; const lvl=Math.floor(state.xp/per)+1;
  const into=state.xp%per; return {lvl, into, per, pct:Math.round(into/per*100)};
}
function isDone(w,i){ return !!state.done[w+"_"+i]; }
function worldObj(id){ return GAME.worlds.find(w=>w.id===id); }
function worldProgress(w){
  const total=w.levels.length; let d=0;
  for(let i=0;i<total;i++) if(isDone(w.id,i)) d++;
  return {d,total,pct: total? Math.round(d/total*100):0};
}
/* un monde est déverrouillé si le précédent est fini (le 1er est ouvert) */
function worldUnlocked(idx){
  if(idx===0) return true;
  const prev=GAME.worlds[idx-1]; return worldProgress(prev).pct===100;
}
/* un niveau est déverrouillé si le précédent du même monde est fait */
function levelUnlocked(w,i){ return i===0 || isDone(w.id,i-1); }

/* ---------- BADGES ---------- */
const BADGES=[
  {id:"first", em:"👶", nm:"Premiers pas", cond:()=> state.xp>0},
  {id:"html", em:"🧱", nm:"Bâtisseur", cond:()=> worldProgress(worldObj("html")).pct===100},
  {id:"css", em:"🎨", nm:"Artiste", cond:()=> worldProgress(worldObj("css")).pct===100},
  {id:"js", em:"⚡", nm:"Éclair", cond:()=> worldProgress(worldObj("js")).pct===100},
  {id:"streak3", em:"🔥", nm:"3 jours", cond:()=> state.streak>=3},
  {id:"lvl5", em:"🏆", nm:"Niveau 5", cond:()=> levelInfo().lvl>=5},
  {id:"agent", em:"🤖", nm:"Agent Builder", cond:()=> worldProgress(worldObj("agent")||{levels:[]}).pct===100},
];

/* ---------- STREAK (série de jours) ---------- */
function touchStreak(){
  const today=new Date().toISOString().slice(0,10);
  if(state.lastDay===today) return;
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  state.streak = (state.lastDay===yest) ? state.streak+1 : 1;
  state.lastDay=today; save();
}

/* ================================================================
   RENDU (vues : home / world / level)
   ================================================================ */
const app=document.getElementById("app");
let view={name:"home"};
let draftTimer=null;

function renderHeader(){
  const L=levelInfo();
  document.getElementById("hStreak").textContent=state.streak;
  document.getElementById("hLvl").textContent=L.lvl;
  document.getElementById("hXp").style.width=L.pct+"%";
}

function render(){
  renderHeader();
  if(view.name==="home") return renderHome();
  if(view.name==="world") return renderWorld(view.world);
  if(view.name==="level") return renderLevel(view.world, view.i);
  if(view.name==="course") return renderCourse(view.world);
}

function renderHome(){
  const L=levelInfo();
  let badges = BADGES.map(b=>{
    const on=b.cond(); if(on && !state.badges[b.id]){ state.badges[b.id]=1; save(); }
    return `<div class="badge ${on?'on':''}"><div class="em">${b.em}</div><div class="nm">${b.nm}</div></div>`;
  }).join("");

  let worlds = GAME.worlds.map((w,idx)=>{
    const unlocked=worldUnlocked(idx); const p=worldProgress(w);
    return `<div class="world ${unlocked?'':'locked'}" ${unlocked?`onclick="goWorld('${w.id}')"`:''}>
      <div class="stripe" style="background:${w.couleur}"></div>
      ${unlocked?'':'<div class="lockicon">🔒</div>'}
      <div class="em">${w.emoji}</div>
      <h3>${w.titre}</h3>
      <div class="sub">${w.desc}</div>
      <div class="pbar"><i style="width:${p.pct}%;background:${w.couleur}"></i></div>
      <div class="pct">${p.d}/${p.total} niveaux</div>
    </div>`;
  }).join("");

  app.innerHTML=`
    <div class="modes">
      <button class="modebtn active">🎮 Jouer</button>
      <button class="modebtn" onclick="goCourse()">📚 Cours</button>
    </div>
    <div class="hero">
      <h1>Salut Wassim 👋</h1>
      <p>Ta pré-formation dev, en jeu. Un niveau par jour et tu arrives prêt pour O'Clock.</p>
      <div class="lvlrow">
        <div class="lvlbadge">Niveau ${L.lvl}</div>
        <div class="xpbar"><i style="width:${L.pct}%"></i></div>
        <div class="xptxt">${L.into}/${L.per} XP</div>
      </div>
    </div>
    <div class="sec-title">🏅 Tes badges</div>
    <div class="badges">${badges}</div>
    <div class="sec-title">🗺️ Les mondes</div>
    <div class="map">${worlds}</div>
    <div class="foot">
      ${storageOK ? '✅ Ta progression est sauvegardée sur cet appareil.' : '⚠️ Ce lecteur ne garde pas ta progression. Ouvre le fichier dans Chrome/Safari, ou garde ton code avec « Sauvegarder ».'}
      <br><br>
      <span class="reset" onclick="exportSave()">💾 Sauvegarder mon code</span> &nbsp;·&nbsp;
      <span class="reset" onclick="importSave()">📥 Restaurer</span> &nbsp;·&nbsp;
      <span class="reset" onclick="resetGame()">↺ Réinitialiser</span>
    </div>`;
  window.scrollTo(0,0);
}

function renderWorld(id){
  const w=worldObj(id);
  let lvls=w.levels.map((lv,i)=>{
    const done=isDone(id,i); const unlocked=levelUnlocked(w,i);
    const node = done? "✓" : (unlocked? (i+1) : "🔒");
    return `<div class="lvl ${done?'done':''} ${unlocked?'':'locked'}" ${unlocked?`onclick="goLevel('${id}',${i})"`:''}>
      <div class="node" style="${unlocked&&!done?`background:${w.couleur}`:''}">${node}</div>
      <div><div class="t">${lv.titre}</div><div class="d">${done?'Terminé ✓':(unlocked?'+20 XP':'À débloquer')}</div></div>
      <div class="chev">›</div>
    </div>`;
  }).join("");
  app.innerHTML=`
    <div class="back" onclick="goHome()">← Carte</div>
    <div class="worldhead"><div class="em">${w.emoji}</div>
      <div><h2>${w.titre}</h2><div class="sub">${w.desc}</div></div></div>
    <div class="levels">${lvls}</div>`;
  window.scrollTo(0,0);
}

function renderLevel(id,i){
  const w=worldObj(id); const lv=w.levels[i];
  /* brouillon sauvegardé pour cet exercice ? on le restaure à la place
     du code de départ (lv.defi.start) — sinon on repart de zéro à chaque fois */
  const draft=(state.drafts||{})[id+"_"+i];
  const startCode=(draft!=null) ? draft : (lv.defi.start||"");
  let defiHTML="";
  if(lv.defi.type==="quiz"){
    defiHTML=`<div class="defi">
      <div class="lab">🎯 Défi</div>
      <div class="q">${lv.defi.q}</div>
      <div class="opts">${lv.defi.opts.map((o,k)=>`<button class="opt" onclick="answerQuiz(this,${k})">${o}</button>`).join("")}</div>
      <div class="expl" id="expl">${lv.defi.expl}</div>
    </div>`;
  } else if(lv.defi.type==="code"){
    defiHTML=`<div class="defi">
      <div class="lab">🎯 Défi code</div>
      <div class="q">${lv.defi.q}</div>
      <textarea class="editor" id="ed" oninput="onEditorInput('${id}',${i})">${esc(startCode)}</textarea>
      <div class="runrow">
        <button class="btn ghost" onclick="runCode()">▶ Tester</button>
        <button class="btn primary" onclick="checkCode()">✓ Valider le défi</button>
      </div>
      <iframe class="out" id="out"></iframe>
      <div class="expl" id="expl">${lv.defi.expl}</div>
    </div>`;
  } else if(lv.defi.type==="ecris"){
    defiHTML=`<div class="defi">
      <div class="lab">✍️ Exercice à écrire</div>
      <div class="q">${lv.defi.q}</div>
      <textarea class="editor" id="ed" oninput="onEditorInput('${id}',${i})">${esc(startCode)}</textarea>
      <div class="runrow">
        <button class="btn ghost" onclick="revealSol()">💡 Voir la solution</button>
        <button class="btn primary" onclick="win()">✓ J'ai réussi</button>
      </div>
      <div class="expl" id="expl"><b>Une solution possible :</b><pre class="code">${esc(lv.defi.sol||"")}</pre>${lv.defi.expl||""}</div>
    </div>`;
  }
  app.innerHTML=`
    <div class="back" onclick="goWorld('${id}')">← ${w.titre}</div>
    <div class="lesson">${lv.lecon}</div>
    ${defiHTML}`;
  window.scrollTo(0,0);
  view={name:"level", world:id, i:i};
  if(lv.defi.type==="code") runCode();
}

/* ================================================================
   INTERACTIONS
   ================================================================ */
function goHome(){ flushDraft(); view={name:"home"}; render(); }
function goWorld(id){ flushDraft(); view={name:"world", world:id}; render(); }
function goLevel(id,i){ renderLevel(id,i); }
function goCourse(id){ flushDraft(); view={name:"course", world: id || view.world || GAME.worlds[0].id}; render(); }

/* ---------- BROUILLON ÉDITEUR (anti-perte de progression) ---------- */
/* écrit à chaque frappe, mais avec un debounce : on attend 500ms sans
   frappe avant d'écrire dans localStorage, pour ne pas spammer save() */
function onEditorInput(id,i){
  clearTimeout(draftTimer);
  draftTimer=setTimeout(()=>{
    const el=document.getElementById("ed");
    if(!el) return;
    if(!state.drafts) state.drafts={};
    state.drafts[id+"_"+i]=el.value;
    save();
  }, 500);
}
/* filet de sécurité : si on quitte le niveau avant les 500ms du debounce
   (ex: clic rapide sur "← Monde"), on sauvegarde quand même tout de suite */
function flushDraft(){
  clearTimeout(draftTimer);
  const el=document.getElementById("ed");
  if(el && view.name==="level"){
    if(!state.drafts) state.drafts={};
    state.drafts[view.world+"_"+view.i]=el.value;
    save();
  }
}

function renderCourse(activeId){
  if(!activeId || !worldObj(activeId)) activeId=GAME.worlds[0].id;
  const w=worldObj(activeId);
  const tabs=GAME.worlds.map(x=>{
    const on = x.id===activeId;
    return `<button class="ctab ${on?'active':''}" onclick="goCourse('${x.id}')"
      style="${on?`border-color:${x.couleur};color:${x.couleur}`:''}">${x.emoji} ${x.titre}</button>`;
  }).join("");
  const lessons=w.levels.map((lv,i)=>`
    <div class="lesson">
      <div class="chapnum" style="color:${w.couleur}">Chapitre ${i+1}</div>
      ${lv.lecon}
    </div>`).join("");
  app.innerHTML=`
    <div class="modes">
      <button class="modebtn" onclick="goHome()">🎮 Jouer</button>
      <button class="modebtn active">📚 Cours</button>
    </div>
    <div class="ctabs">${tabs}</div>
    <h2 style="margin:4px 4px 2px">${w.emoji} ${w.titre}</h2>
    <div class="courseintro">${w.desc} — lis à ton rythme, rien n'est verrouillé ici. Reviens en mode Jouer pour les défis.</div>
    ${lessons}
    <div class="foot">Fin du chapitre « ${w.titre} » · choisis un autre onglet en haut ☝️</div>`;
  window.scrollTo(0,0);
  view={name:"course", world:activeId};
}

function answerQuiz(btn,k){
  const lv=worldObj(view.world).levels[view.i];
  const opts=btn.parentElement;
  if(opts.dataset.done) return;
  opts.dataset.done="1";
  [...opts.children].forEach((b,idx)=>{ b.disabled=true; if(idx===lv.defi.correct) b.classList.add("good"); });
  document.getElementById("expl").classList.add("show");
  if(k===lv.defi.correct){ win(); }
  else { btn.classList.add("bad"); addRetry(); }
}

function runCode(){
  const v=document.getElementById("ed").value;
  document.getElementById("out").srcdoc=v;
}
function checkCode(){
  const lv=worldObj(view.world).levels[view.i];
  const v=document.getElementById("ed").value;
  runCode();
  document.getElementById("expl").classList.add("show");
  if(lv.defi.check(v)){ document.getElementById("expl").style.color="#15803d"; win(); }
  else { document.getElementById("expl").style.color="#b91c1c";
    document.getElementById("expl").innerHTML="Presque ! Relis l'objectif et vérifie ta syntaxe, puis re-valide."; }
}
function revealSol(){ document.getElementById("expl").classList.add("show"); }

function addRetry(){
  const d=document.querySelector(".defi");
  if(d.querySelector(".btn.retry")) return;
  const b=document.createElement("button"); b.className="btn ghost full retry";
  b.textContent="↻ Réessayer"; b.onclick=()=>renderLevel(view.world,view.i);
  d.appendChild(b);
}

/* ---------- GAGNER un niveau ---------- */
function win(){
  const key=view.world+"_"+view.i;
  const already=state.done[key];
  if(!already){
    state.done[key]=1; state.xp+=20; touchStreak();
    const L=levelInfo();
    const w=worldObj(view.world);
    const worldFini=worldProgress(w).pct===100;
    save();
    celebrate(worldFini?"🏆":"🎉", worldFini?"Monde terminé !":"Niveau réussi !", "+20 XP",
      worldFini?`Tu maîtrises ${w.titre}. Le monde suivant est débloqué !`:"Continue sur ta lancée 💪");
  } else {
    celebrate("✅","Déjà validé","+0 XP","Tu avais déjà gagné l'XP de ce niveau.");
  }
}

/* ---------- CÉLÉBRATION ---------- */
function celebrate(emo,title,xp,msg){
  document.getElementById("celEmo").textContent=emo;
  document.getElementById("celTitle").textContent=title;
  document.getElementById("celXp").textContent=xp;
  document.getElementById("celMsg").textContent=msg;
  document.getElementById("cel").classList.add("show");
  confetti();
}
function closeCel(){
  document.getElementById("cel").classList.remove("show");
  goWorld(view.world);
}
function confetti(){
  const colors=["#6366f1","#f59e0b","#22c55e","#fb7185","#3b82f6","#a855f7"];
  for(let i=0;i<28;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=Math.random()*100+"vw"; c.style.background=colors[i%colors.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const fall=600+Math.random()*700;
    c.animate([{top:"-10px",opacity:1},{top:"100vh",opacity:.9}],{duration:fall,easing:"ease-in"});
    setTimeout(()=>c.remove(),fall);
  }
}

function exportSave(){
  const code=JSON.stringify(state);
  try{ prompt("📋 Copie ce code et garde-le (Notes, mail à toi-même…). Pour le réutiliser plus tard : bouton « Restaurer ».", code); }
  catch(e){ alert("Ton code de sauvegarde :\n\n"+code); }
}
function importSave(){
  try{
    const s=prompt("Colle ici ton code de sauvegarde :");
    if(s && s.trim()){
      state=Object.assign({xp:0,done:{},streak:0,lastDay:null,badges:{},drafts:{}}, JSON.parse(s.trim()));
      save(); goHome(); alert("✅ Progression restaurée !");
    }
  }catch(e){ alert("Code invalide, réessaie."); }
}
function resetGame(){
  if(confirm("Remettre toute ta progression à zéro ?")){
    state={xp:0,done:{},streak:0,lastDay:null,badges:{},drafts:{}}; save(); goHome();
  }
}

/* ---------- GO ---------- */
render();
</script>
</body>
</html>
